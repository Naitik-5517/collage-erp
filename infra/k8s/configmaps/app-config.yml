apiVersion: v1
kind: Namespace
metadata:
  name: college-erp
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: college-erp
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  API_VERSION: "v1"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: college-erp
data:
  redis.conf: |
    maxmemory 2gb
    maxmemory-policy allkeys-lru
    save 900 1
    save 300 10
    save 60 10000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: college-erp
data:
  init.sql: |
    CREATE DATABASE college_erp;
    CREATE USER college_erp_user WITH ENCRYPTED PASSWORD 'changeme';
    GRANT ALL PRIVILEGES ON DATABASE college_erp TO college_erp_user;
