apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: college-erp
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
      
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: false
      
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger:16686
        editable: false
      
      - name: PostgreSQL
        type: postgres
        url: postgres:5432
        database: college_erp
        user: $POSTGRES_USER
        secureJsonData:
          password: $POSTGRES_PASSWORD
        jsonData:
          sslmode: disable
          postgresVersion: 1600
        editable: false
