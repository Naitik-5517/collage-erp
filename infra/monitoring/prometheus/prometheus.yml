# Prometheus Configuration for College ERP

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'college-erp'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # API Gateway
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']

  # Auth Service
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']

  # Student Service
  - job_name: 'student-service'
    static_configs:
      - targets: ['student-service:3002']

  # Academic Service
  - job_name: 'academic-service'
    static_configs:
      - targets: ['academic-service:3003']

  # Exam Service
  - job_name: 'exam-service'
    static_configs:
      - targets: ['exam-service:3004']

  # Finance Service
  - job_name: 'finance-service'
    static_configs:
      - targets: ['finance-service:3005']

  # Library Service
  - job_name: 'library-service'
    static_configs:
      - targets: ['library-service:3006']

  # LMS Service
  - job_name: 'lms-service'
    static_configs:
      - targets: ['lms-service:3007']

  # Messaging Service
  - job_name: 'messaging-service'
    static_configs:
      - targets: ['messaging-service:3008']

  # Notification Service
  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:3009']

  # Report Service
  - job_name: 'report-service'
    static_configs:
      - targets: ['report-service:3010']

  # Search Service
  - job_name: 'search-service'
    static_configs:
      - targets: ['search-service:3011']

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Node Exporter
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Kubernetes Monitoring
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
      - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
